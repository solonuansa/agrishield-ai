name: Deploy

on:
  push:
    branches: ["main"]
    tags: ["v*.*.*"]

env:
  REGISTRY: ghcr.io
  # Ganti dengan nama org/repo GitHub Anda
  IMAGE_PREFIX: ghcr.io/${{ github.repository_owner }}/agrishield-ai

jobs:
  # ── Build & push Docker images ───────────────────────────────
  build:
    name: Build & Push Images
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    strategy:
      matrix:
        include:
          - service: api
            context: ./backend
          - service: ml-service
            context: ./ml-service
          - service: frontend
            context: ./frontend

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_PREFIX }}/${{ matrix.service }}
          tags: |
            type=sha,prefix=sha-
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.context }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Deploy ke server via SSH ─────────────────────────────────
  deploy:
    name: Deploy to Server
    runs-on: ubuntu-latest
    needs: build
    # Hanya deploy jika push ke main (bukan tag)
    if: github.ref == 'refs/heads/main'
    environment: production

    steps:
      - uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /opt/agrishield-ai

            # Pull image terbaru
            export IMAGE_TAG=sha-${{ github.sha }}
            docker compose -f docker-compose.prod.yml pull

            # Jalankan migrasi database
            docker compose -f docker-compose.prod.yml run --rm api \
              alembic upgrade head

            # Rolling restart: api dulu, lalu yang lain
            docker compose -f docker-compose.prod.yml up -d --no-deps api
            docker compose -f docker-compose.prod.yml up -d --no-deps worker
            docker compose -f docker-compose.prod.yml up -d --no-deps ml-service
            docker compose -f docker-compose.prod.yml up -d --no-deps nginx

            # Hapus image lama
            docker image prune -f
