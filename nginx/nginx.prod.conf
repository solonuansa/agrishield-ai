events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # ── Logging ──────────────────────────────────────────────
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent"';
    access_log /var/log/nginx/access.log main;
    error_log  /var/log/nginx/error.log warn;

    # ── Optimasi ─────────────────────────────────────────────
    sendfile           on;
    keepalive_timeout  65;
    client_max_body_size 10M;
    gzip               on;
    gzip_types         text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;
    gzip_min_length    1000;

    # ── Upstream ─────────────────────────────────────────────
    upstream api_backend {
        server api:8000;
    }

    # ── HTTP → redirect HTTPS ─────────────────────────────────
    server {
        listen 80;
        server_name _;
        return 301 https://$host$request_uri;
    }

    # ── HTTPS ─────────────────────────────────────────────────
    server {
        listen 443 ssl;
        # Ganti dengan domain production
        server_name agrishield.id www.agrishield.id;

        # Sertifikat Let's Encrypt — generate dengan:
        # certbot certonly --nginx -d agrishield.id -d www.agrishield.id
        ssl_certificate     /etc/letsencrypt/live/agrishield.id/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/agrishield.id/privkey.pem;

        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;
        ssl_session_cache   shared:SSL:10m;
        ssl_session_timeout 10m;

        # Security headers
        add_header X-Frame-Options           "SAMEORIGIN"   always;
        add_header X-Content-Type-Options    "nosniff"      always;
        add_header X-XSS-Protection          "1; mode=block" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

        # API routes → FastAPI
        location /api/ {
            proxy_pass         http://api_backend;
            proxy_http_version 1.1;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_read_timeout 120s;
        }

        # Frontend static files — di-build saat Docker image dibuat
        # Image frontend sudah include hasil `npm run build` di /usr/share/nginx/html
        location / {
            root  /usr/share/nginx/html;
            index index.html;
            # SPA fallback — semua route dikembalikan ke index.html
            try_files $uri $uri/ /index.html;

            # Cache static assets (JS/CSS/images) 1 tahun
            location ~* \.(js|css|png|jpg|jpeg|webp|svg|ico|woff2)$ {
                expires 1y;
                add_header Cache-Control "public, immutable";
            }
        }
    }
}
