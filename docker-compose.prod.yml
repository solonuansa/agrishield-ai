version: "3.9"

# ============================================================
# AgriShield AI — Docker Compose Production
#
# Perbedaan utama dari docker-compose.yml (dev):
# - Tidak ada volume mount kode sumber (no hot-reload)
# - Frontend di-build menjadi static files, di-serve Nginx langsung
# - Uvicorn dijalankan dengan multiple workers, tanpa --reload
# - Port DB dan Redis tidak di-expose ke host
# - Semua service pakai restart: always
# ============================================================

services:
  # ── PostgreSQL + PostGIS ──────────────────────────────────
  db:
    image: postgis/postgis:16-3.4
    container_name: agrishield_db
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    # Port tidak di-expose ke host di production
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis ─────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: agrishield_redis
    restart: always
    # Port tidak di-expose ke host di production
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Backend API (FastAPI) ──────────────────────────────────
  api:
    image: ${DOCKER_REGISTRY:-ghcr.io}/agrishield-ai/api:${IMAGE_TAG:-latest}
    container_name: agrishield_api
    restart: always
    env_file: .env
    environment:
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
      ML_SERVICE_URL: ${ML_SERVICE_URL:-http://ml-service:8001}
      ENVIRONMENT: production
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    # 4 worker untuk production — sesuaikan dengan jumlah CPU
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers 4

  # ── Celery Worker ─────────────────────────────────────────
  worker:
    image: ${DOCKER_REGISTRY:-ghcr.io}/agrishield-ai/api:${IMAGE_TAG:-latest}
    container_name: agrishield_worker
    restart: always
    env_file: .env
    environment:
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
      ML_SERVICE_URL: ${ML_SERVICE_URL:-http://ml-service:8001}
      ENVIRONMENT: production
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: celery -A app.tasks.celery_app worker --loglevel=warning --concurrency=4

  # ── ML Service ────────────────────────────────────────────
  ml-service:
    image: ${DOCKER_REGISTRY:-ghcr.io}/agrishield-ai/ml-service:${IMAGE_TAG:-latest}
    container_name: agrishield_ml
    restart: always
    env_file: .env
    environment:
      USE_MOCK_MODEL: ${USE_MOCK_MODEL:-false}
      ENVIRONMENT: production
    command: uvicorn app.main:app --host 0.0.0.0 --port 8001 --workers 2

  # ── Nginx (Reverse Proxy + Static Files) ──────────────────
  nginx:
    image: ${DOCKER_REGISTRY:-ghcr.io}/agrishield-ai/frontend:${IMAGE_TAG:-latest}
    container_name: agrishield_nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.prod.conf:/etc/nginx/nginx.conf:ro
      # Sertifikat SSL — isi dengan path sertifikat di server
      # Gunakan Certbot/Let's Encrypt: certbot certonly --nginx -d yourdomain.com
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      - api

volumes:
  postgres_data:
