version: "3.9"

# ============================================================
# AgriShield AI — Docker Compose Production
#
# Perbedaan utama dari docker-compose.yml (dev):
# - Tidak ada volume mount kode sumber (no hot-reload)
# - Frontend di-build menjadi static files, di-serve Nginx langsung
# - Uvicorn dijalankan dengan multiple workers, tanpa --reload
# - Port DB dan Redis tidak di-expose ke host
# - Semua service pakai restart: always
# ============================================================

services:
  # ── PostgreSQL + PostGIS ──────────────────────────────────
  db:
    image: postgis/postgis:16-3.4
    container_name: agrishield_db
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    command: postgres -c shared_buffers=256MB -c effective_cache_size=1GB -c max_connections=50
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: 3
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 1G

  # ── Redis ─────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: agrishield_redis
    restart: always
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD}
    command: redis-server --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: 3
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M

  # ── Backend API (FastAPI) ──────────────────────────────────
  api:
    image: ${DOCKER_REGISTRY:-ghcr.io}/agrishield-ai/api:${IMAGE_TAG:-latest}
    container_name: agrishield_api
    restart: always
    env_file: .env
    environment:
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
      ML_SERVICE_URL: ${ML_SERVICE_URL:-http://ml-service:8001}
      ENVIRONMENT: production
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health')"]
      interval: 30s
      timeout: 5s
      start_period: 15s
      retries: 3
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers ${UVICORN_WORKERS:-4}
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: 3
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M

  # ── Celery Worker ─────────────────────────────────────────
  worker:
    image: ${DOCKER_REGISTRY:-ghcr.io}/agrishield-ai/api:${IMAGE_TAG:-latest}
    container_name: agrishield_worker
    restart: always
    env_file: .env
    environment:
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
      ML_SERVICE_URL: ${ML_SERVICE_URL:-http://ml-service:8001}
      ENVIRONMENT: production
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "celery -A app.tasks.celery_app inspect ping || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
    command: celery -A app.tasks.celery_app worker --loglevel=warning --concurrency=${CELERY_CONCURRENCY:-4}
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: 3
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 1G

  # ── ML Service ────────────────────────────────────────────
  ml-service:
    image: ${DOCKER_REGISTRY:-ghcr.io}/agrishield-ai/ml-service:${IMAGE_TAG:-latest}
    container_name: agrishield_ml
    restart: always
    env_file: .env
    environment:
      USE_MOCK_MODEL: ${USE_MOCK_MODEL:-false}
      ENVIRONMENT: production
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8001/health')"]
      interval: 30s
      timeout: 5s
      start_period: 15s
      retries: 3
    command: uvicorn app.main:app --host 0.0.0.0 --port 8001 --workers ${ML_WORKERS:-2}
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: 3
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 2G

  # ── Nginx (Reverse Proxy + Static Files) ──────────────────
  nginx:
    image: ${DOCKER_REGISTRY:-ghcr.io}/agrishield-ai/frontend:${IMAGE_TAG:-latest}
    container_name: agrishield_nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.prod.conf:/etc/nginx/nginx.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/"]
      interval: 30s
      timeout: 5s
      retries: 3
    depends_on:
      api:
        condition: service_healthy
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: 3
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 128M

volumes:
  postgres_data:
  redis_data:
